openapi: 3.0.3
info:
  title: TukAPI
  version: 1.0.0
  description: >
    OpenAPI draft for the Sri Lanka Police tuk-tuk tracking and movement logging API.
    This document covers authentication, protected master-data management, device ping
    ingestion, and live or historical location lookup endpoints.
servers:
  - url: http://localhost:3000/api/v1
    description: Local development
tags:
  - name: Auth
    description: User authentication and token management.
  - name: Provinces
    description: Province reference data.
  - name: Districts
    description: District reference data.
  - name: Stations
    description: Police station management.
  - name: Drivers
    description: Driver management.
  - name: TukTuks
    description: Tuk-tuk registry and assignment management.
  - name: Devices
    description: Tracking device registry and assignment management.
  - name: Users
    description: Authorized law-enforcement user administration.
  - name: Locations
    description: Device ping ingestion and live or historical location access.

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a law-enforcement user
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: hq.admin@demo.local
              password: DemoPass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate access and refresh tokens
      operationId: refreshTokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current refresh token
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Resolve the authenticated user profile
      operationId: getCurrentAuthenticatedUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Authenticated user returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
              example:
                success: true
                message: Authenticated user resolved successfully.
                data:
                  id: cm9x7a1bc0019abc123456789
                  fullName: HQ Administrator
                  email: hq.admin@demo.local
                  badgeNumber: HQ-001
                  role: HQ_ADMIN
                  provinceId: null
                  districtId: null
                  stationId: null
                  phoneNumber: null
                  isActive: true
                  lastLoginAt: '2026-04-30T03:55:00.000Z'
                  createdAt: '2026-04-20T09:00:00.000Z'
                  updatedAt: '2026-04-30T03:55:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

