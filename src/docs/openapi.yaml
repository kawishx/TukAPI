components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token for authenticated law-enforcement users.
    DeviceTokenAuth:
      type: apiKey
      in: header
      name: X-Device-Token
      description: Device token used for telemetry ingestion routes.

  headers:
    ETag:
      description: Weak entity tag for conditional GET support.
      schema:
        type: string
      example: W/"S2JkQm5GQ1hPVEp5R0FxQ0pmVQ"
    LastModified:
      description: Last modification timestamp for conditional GET support.
      schema:
        type: string
        format: date-time
      example: '2026-04-29T06:25:13.000Z'
    CacheControl:
      description: Cache directive for the returned representation.
      schema:
        type: string
      example: private, max-age=30, must-revalidate
    Location:
      description: Relative URI of the created resource.
      schema:
        type: string
      example: /api/v1/tuk-tuks/cm9x7a1bc0006abc123456789

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
    TukTukIdPath:
      name: tukTukId
      in: path
      required: true
      schema:
        type: string
      description: Tuk-tuk identifier.
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of records per page.
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Free-text search term.
    ProvinceId:
      name: provinceId
      in: query
      schema:
        type: string
      description: Filter by province ID.
    ProvinceCode:
      name: provinceCode
      in: query
      schema:
        type: string
      description: Filter by province code.
    DistrictId:
      name: districtId
      in: query
      schema:
        type: string
      description: Filter by district ID.
    StationId:
      name: stationId
      in: query
      schema:
        type: string
      description: Filter by station ID.
    DriverId:
      name: driverId
      in: query
      schema:
        type: string
      description: Filter by driver ID.
    DeviceId:
      name: deviceId
      in: query
      schema:
        type: string
      description: Filter by device ID.
    TukTukId:
      name: tukTukId
      in: query
      schema:
        type: string
      description: Filter by tuk-tuk ID.
    IsActive:
      name: isActive
      in: query
      schema:
        type: boolean
      description: Filter by active status.
    LicenseNumber:
      name: licenseNumber
      in: query
      schema:
        type: string
      description: Filter by exact driver license number.
    NationalId:
      name: nationalId
      in: query
      schema:
        type: string
      description: Filter by exact driver national ID.
    PlateNumber:
      name: plateNumber
      in: query
      schema:
        type: string
      description: Filter by exact tuk-tuk plate number.
    RegistrationNumber:
      name: registrationNumber
      in: query
      schema:
        type: string
      description: Filter by exact tuk-tuk registration number.
    SerialNumber:
      name: serialNumber
      in: query
      schema:
        type: string
      description: Filter by exact device serial number.
    UserRole:
      name: role
      in: query
      schema:
        $ref: '#/components/schemas/UserRole'
      description: Filter by user role.
    TukTukStatus:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/TukTukStatus'
      description: Filter by tuk-tuk status.
    DeviceStatus:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/DeviceStatus'
      description: Filter by device status.
    ProvinceSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, name, code]
        default: name
      description: Province sort field.
    DistrictSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, name, code]
        default: name
      description: District sort field.
    StationSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, name, code]
        default: name
      description: Police station sort field.
    DriverSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, fullName, licenseNumber]
        default: createdAt
      description: Driver sort field.
    TukTukSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, registrationNumber, status]
        default: createdAt
      description: Tuk-tuk sort field.
    DeviceSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, serialNumber, status]
        default: createdAt
      description: Device sort field.
    UserSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [createdAt, updatedAt, fullName, email, role]
        default: createdAt
      description: User sort field.
    LiveLocationSortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [recordedAt, receivedAt, updatedAt, createdAt]
        default: recordedAt
      description: Live location sort field.
    LocationHistorySortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [recordedAt, receivedAt, createdAt]
        default: recordedAt
      description: History sort field.
    SortOrderAsc:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: Sort direction.
    SortOrderDesc:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort direction.
    UpdatedAfter:
      name: updatedAfter
      in: query
      schema:
        type: string
        format: date-time
      description: Return only live records updated on or after this timestamp.
    FromTime:
      name: from
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive start of the requested time range.
    ToTime:
      name: to
      in: query
      schema:
        type: string
        format: date-time
      description: Inclusive end of the requested time range.
    IgnitionOn:
      name: ignitionOn
      in: query
      schema:
        type: boolean
      description: Filter by ignition state.
    IfNoneMatch:
      name: If-None-Match
      in: header
      schema:
        type: string
      description: Conditional GET validator based on the last returned ETag.
    IfModifiedSince:
      name: If-Modified-Since
      in: header
      schema:
        type: string
        format: date-time
      description: Conditional GET validator based on resource modification time.

  responses:
    NotModified:
      description: Resource has not changed since the supplied cache validator.
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
        Last-Modified:
          $ref: '#/components/headers/LastModified'
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
    BadRequest:
      description: Request failed validation or query parsing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Validation failed.
            errors:
              - path: query.limit
                message: Number must be less than or equal to 100.
    Unauthorized:
      description: Authentication failed or credentials are missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Authentication token is required.
    Forbidden:
      description: Authenticated caller does not have access to this resource or scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
