services:
  - type: web
    name: tukapi
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tukapi-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_PREFIX
        value: /api/v1
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: SWAGGER_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"

databases:
  - name: tukapi-postgres
    plan: basic-256mb
    region: singapore
    databaseName: tukapi
